<div class="page-overlay">
    <div class="decorated-container" data-hyui-title="{{ui.runtime_config.title}}" style="anchor-width: 1500; anchor-height: 860;">
        <div class="container-contents" style="anchor-full: 14; layout-mode: top; spacing: 8;">
            <div style="layout-mode: top; spacing: 2;">
                <h2 style="text-align: center;">{{ui.runtime_config.title}}</h2>
                <p style="text-align: center; color: #B8C7D8;">{{ui.runtime_config.subtitle}}</p>
            </div>

            <img src="divider.png" style="anchor-width: 1480; anchor-height: 3;">

            <div style="layout-mode: left; spacing: 10; anchor-height: 96; background-color: #101827; padding: 8;">
                <div style="layout-mode: top; spacing: 8; anchor-width: 250;">
                    <p style="font-weight: bold;">{{ui.runtime_config.section_controls}}</p>
                    <div style="layout-mode: left; spacing: 8;">
                        <button id="reloadAllButton" class="secondary-button default-style" style="anchor-width: 118; anchor-height: 34;">{{ui.runtime_config.button_reload}}</button>
                        <button id="resetDefaultsButton" class="secondary-button default-style" style="anchor-width: 118; anchor-height: 34;">{{ui.runtime_config.button_reset}}</button>
                    </div>
                </div>
                <div style="layout-mode: top; spacing: 4; anchor-width: 1200;">
                    <p style="font-weight: bold;">Status</p>
                    <div id="statusScroll" style="layout-mode: topscrolling; anchor-width: 1200; anchor-height: 58; background-color: #0B1020; padding: 6;">
                        <p id="statusLabel" style="white-space: pre-line; color: #D8DEE9;">{{statusText}}</p>
                    </div>
                </div>
            </div>

            <div id="categoryNav" style="anchor-width: 1480; anchor-height: 54; layout-mode: left; spacing: 8; background-color: #0F1520; padding: 8; overflow-x: auto; overflow-y: hidden;">
                {{categoryTabsHtml}}
            </div>

            <div style="layout-mode: left; spacing: 10; anchor-width: 1480; anchor-height: 640;">
                <div style="layout-mode: top; spacing: 6; anchor-width: 300; anchor-height: 640; background-color: #101827; padding: 8;">
                    <p style="font-weight: bold;">{{ui.runtime_config.label_section}}</p>
                    <div id="sectionScroll" style="layout-mode: topscrolling; anchor-width: 284; anchor-height: 594; background-color: #0F1520; padding: 6;">
                        {{groupNavHtml}}
                    </div>
                </div>

                <div style="layout-mode: top; spacing: 6; anchor-width: 1170; anchor-height: 640; background-color: #101827; padding: 8;">
                    <p style="font-weight: bold;">{{ui.runtime_config.section_values}}</p>
                    <div id="controlsPanel" style="layout-mode: topscrolling; anchor-width: 1154; anchor-height: 544; background-color: #0F1520; padding: 8;">
                        {{controlsHtml}}
                    </div>
                    <div style="layout-mode: right; anchor-width: 1154; anchor-height: 42; padding-top: 4;">
                        <button id="applyChangesButton" class="secondary-button default-style" style="anchor-width: 190; anchor-height: 34;">{{ui.runtime_config.button_apply}}</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
