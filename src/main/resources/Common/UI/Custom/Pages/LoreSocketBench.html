<div class="page-overlay">
    <div class="decorated-container" data-hyui-title="{{ui.lore_socket.title}}" style="anchor-width: 900; anchor-height: 640;">
        <div class="container-contents" style="anchor-full: 14; overflow-y:auto;">
            <h2 style="text-align:center;">{{ui.lore_socket.title}}</h2>
            <p style="text-align:center;">{{ui.lore_socket.subtitle}}</p>
            <hr/>
            <img id="dynamic-image" src="divider.png" style="anchor-width: 900; anchor-height: 3;">

            <div style="layout-mode:center; spacing:16;">
                <div style="anchor-width:300; layout-mode:Top;">
                    <p style="text-align:center;">{{ui.lore_socket.equipment}}</p>
                    <select id="equipmentDropdown" data-hyui-showlabel="true" style="anchor-width: 300;">
                        {{equipmentOptions}}
                    </select>
                </div>
                <div style="anchor-width:300; layout-mode:Top;">
                    <p style="text-align:center;">{{ui.lore_socket.gem}}</p>
                    <select id="gemDropdown" data-hyui-showlabel="true" style="anchor-width: 300;">
                        {{gemOptions}}
                    </select>
                </div>
            </div>

            <p style="text-align:center;">{{ui.lore_socket.slot}}</p>
            <div style="anchor-width: 900; layout-mode:Center;">
                <select id="slotDropdown" data-hyui-showlabel="true" style="anchor-width: 280;">
                    {{slotOptions}}
                </select>
            </div>

            <hr/>
            <img id="dynamic-image" src="divider.png" style="anchor-width: 900; anchor-height: 3;">
            <p>{{ui.lore_socket.sockets}}</p>
            <div id="loreSocketRow">{{socketIcons}}</div>

            <hr/>
            <img id="dynamic-image" src="divider.png" style="anchor-width: 900; anchor-height: 3;">
            <p>{{ui.lore_socket.status}}</p>
            <p id="statusLabel">{{statusText}}</p>

            <hr/>
            <p>{{ui.lore_socket.metadata}}</p>
            <p id="metadataLabel" style="white-space:pre-line;max-height:180px;overflow-y:auto;word-break:break-word;background-color:#1a1a2b;padding:8;border-radius:4;">{{metadataText}}</p>

            <img id="dynamic-image" src="divider.png" style="anchor-width: 900; anchor-height: 3;">
            <button id="processButton" style="width:100%;height:40px;" {{processDisabledAttr}}>{{ui.lore_socket.process_button}}</button>
        </div>
    </div>
</div>
